<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資產管理 App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#243040;--card:#2d3d52;--card2:#364a64;--card3:#3f5575;
  --border:#3d5270;--border2:#4d6690;
  --blue:#5690f5;--blue2:#80b0ff;--teal:#2acce0;
  --green:#38be7a;--amber:#f0a830;--red:#e05a5a;--purple:#9880e8;
  --text:#cfe3f5;--text2:#e8f3ff;--muted:#82a4c8;--muted2:#56789e;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hdr{background:var(--card);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:17px;font-weight:700;color:var(--blue2);letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-date{color:var(--muted);font-size:12px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .18s;line-height:1}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:transparent;color:var(--blue2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--card3)}
.btn-danger{background:rgba(224,90,90,.15);color:var(--red);border:1px solid rgba(224,90,90,.25)}.btn-danger:hover{background:rgba(224,90,90,.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-icon{background:transparent;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:var(--muted);font-size:14px;transition:all .15s}.btn-icon:hover{background:var(--card3);color:var(--text)}
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;position:sticky;top:56px;z-index:99;overflow-x:auto;gap:2px}
.tab{padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:13px;font-weight:500;transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--blue2);border-bottom-color:var(--blue)}
.content{padding:22px;max-width:1300px;margin:0 auto}
.tab-pane{display:none}.tab-pane.active{display:block}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:600;color:var(--text2)}
.sec-sub{font-size:12px;color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px}
.kpi-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.kpi-val{font-size:22px;font-weight:700;margin-bottom:4px;font-variant-numeric:tabular-nums;color:var(--text2)}
.kpi-sub{font-size:11px;display:flex;align-items:center;gap:4px;color:var(--muted)}
.kpi-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:9px;overflow:hidden}
.kpi-fill{height:100%;border-radius:2px;transition:width .5s}
.chart-row{display:grid;gap:14px;margin-bottom:18px}
.col-21{grid-template-columns:2fr 1fr}.col-12{grid-template-columns:1fr 2fr}
.col-2{grid-template-columns:1fr 1fr}.col-3{grid-template-columns:1fr 1fr 1fr}.col-1{grid-template-columns:1fr}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:18px}
.chart-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative}.chart-wrap canvas{max-height:250px}
.tbl-card{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:18px}
.tbl-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:13px;font-weight:600;color:var(--text2)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:9px 14px;text-align:right;background:rgba(0,0,0,.12);color:var(--muted);font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:10px 14px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums;white-space:nowrap}
td:first-child{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
.tag{background:rgba(86,144,245,.15);color:var(--blue2);padding:2px 7px;border-radius:5px;font-size:11px}
.note-cell{color:var(--muted);font-size:11.5px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b-green{background:rgba(56,190,122,.15);color:var(--green)}
.b-amber{background:rgba(240,168,48,.15);color:var(--amber)}
.b-muted{background:rgba(112,144,190,.1);color:var(--muted)}
.goal-tbl-bar{width:80px;height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
.goal-tbl-fill{height:100%;border-radius:4px;transition:width .5s}
.g-row-done td{opacity:.75}
.pg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.pg-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:18px;position:relative}
.pg-date{font-size:20px;font-weight:700;margin-bottom:3px}
.pg-yrs{font-size:11px;color:var(--muted);margin-bottom:10px}
.pg-name{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px}
.pg-note{font-size:11.5px;color:var(--muted)}
.pg-actions{display:flex;gap:6px;margin-top:10px}
.calc-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:18px;margin-bottom:18px;max-width:620px}
.calc-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.calc-input-wrap{display:flex;flex-direction:column;gap:5px}
.calc-lbl{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.calc-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text2);font-size:15px;font-weight:600;outline:none;transition:border-color .2s;width:100%;font-variant-numeric:tabular-nums}
.calc-input:focus{border-color:var(--blue)}
.calc-result{background:var(--card2);border-radius:10px;padding:13px 16px;margin-bottom:10px}
.calc-result-main{font-size:20px;font-weight:700;color:var(--blue2);margin-bottom:3px}
.calc-result-sub{font-size:11.5px;color:var(--muted)}
.pay-sched{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:18px}
.pay-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.pay-code{font-size:11px;color:var(--muted);margin-bottom:3px}
.pay-name{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.pay-months{display:flex;flex-wrap:wrap;gap:4px}
.pay-mon{background:rgba(42,204,224,.12);color:var(--teal);padding:2px 7px;border-radius:5px;font-size:11px}
.pay-none{color:var(--muted2);font-size:11px}
.annual-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:18px}
.annual-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:18px}
.annual-yr{font-size:20px;font-weight:700;color:var(--text2);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px}
.annual-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12.5px}
.annual-row+.annual-row{border-top:1px solid rgba(255,255,255,.04)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:26px;width:100%;max-width:540px;margin:auto}
.modal-title{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-sec{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-top:12px;border-top:1px solid var(--border)}
.modal-sec:first-of-type{margin-top:0;padding-top:0;border-top:none}
.form-grid{display:grid;gap:10px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .18s;width:100%;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg .hint{font-size:10.5px;color:var(--muted2)}
.autofill-note{font-size:11px;color:var(--teal);background:rgba(42,204,224,.08);border-radius:6px;padding:5px 10px;margin-bottom:8px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
@media(max-width:900px){.col-21,.col-12,.col-3,.col-2{grid-template-columns:1fr}.pg-grid{grid-template-columns:1fr 1fr}.calc-row{grid-template-columns:1fr}}
@media(max-width:580px){.kpi-grid{grid-template-columns:1fr 1fr}.content{padding:12px}.hdr{padding:0 12px}.pg-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">💰 資產管理</div>
  <div class="hdr-right">
    <span class="hdr-date" id="hdrDate"></span>
    <button class="btn btn-ghost btn-sm" onclick="exportData()" title="匯出所有資料為 JSON 檔">📤 匯出</button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer" title="從 JSON 檔匯入資料">📥 匯入<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)"></label>
    <button class="btn btn-ghost btn-sm" onclick="openMonthModal()">＋ 新增 / 更新月份</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="overview">📊 總覽</div>
  <div class="tab" data-tab="income">💵 收入儲蓄</div>
  <div class="tab" data-tab="expenses">💳 支出分析</div>
  <div class="tab" data-tab="invest">📈 投資組合</div>
  <div class="tab" data-tab="dividend">🌸 股利追蹤</div>
  <div class="tab" data-tab="goals">🎯 目標追蹤</div>
  <div class="tab" data-tab="annual">📅 年度總結</div>
</div>

<div class="content">
  <div class="tab-pane active" id="tab-overview"></div>
  <div class="tab-pane" id="tab-income"></div>
  <div class="tab-pane" id="tab-expenses"></div>
  <div class="tab-pane" id="tab-invest"></div>
  <div class="tab-pane" id="tab-dividend"></div>
  <div class="tab-pane" id="tab-goals"></div>
  <div class="tab-pane" id="tab-annual"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-sub" id="mSub"></div>
    <div id="mBody"></div>
    <div class="modal-footer" id="mFooter"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
// GitHub Pages 版本：SEED 為空，資料請透過「📥 匯入」載入
const SEED={
  overview:[],income:[],expenses:[],etf:[],
  holdings:[],transactions:[],goals:[],
  personalGoals:[],dividends:[],dividendSchedule:[]
};

let localD = null;
try { localD = JSON.parse(localStorage.getItem('assetMgmt_v3') || 'null'); } catch(e) {}
let D = localD || JSON.parse(JSON.stringify(SEED));

// 【修復 Bug 1】版本更新防呆：確保 localStorage 裡的舊資料，會自動補齊 SEED 中新增的陣列結構
Object.keys(SEED).forEach(k => {
  if (!D[k]) D[k] = JSON.parse(JSON.stringify(SEED[k]));
});

if(D.personalGoals)D.personalGoals.forEach(g=>{if(g.actualDate===undefined)g.actualDate='';});

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const $=id=>document.getElementById(id);
const nt=(n,d=0)=>n==null?'—':(Math.round(n*Math.pow(10,d))/Math.pow(10,d)).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct=n=>n==null?'—':((n*100).toFixed(1)+'%');
const money=n=>n==null?'—':'$'+nt(n);
const fmtM=m=>m?m.replace('-','年')+'月':'—';
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const uid=()=>Date.now()+Math.floor(Math.random()*1000);
const save=()=>{try{localStorage.setItem('assetMgmt_v3',JSON.stringify(D));}catch(e){console.warn('⚠️ 無法寫入 localStorage',e);}};
const COLORS=['#5690f5','#38be7a','#f0a830','#9880e8','#e05a5a','#2acce0'];

let _charts={};
function mkChart(id,cfg){if(_charts[id])_charts[id].destroy();_charts[id]=new Chart($(id),cfg)}
Chart.defaults.color='#82a4c8';
Chart.defaults.font.family='-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
Chart.defaults.font.size=11.5;
Chart.defaults.plugins.legend.labels.boxWidth=10;
Chart.defaults.plugins.legend.labels.padding=14;
const PAL=['#5690f5','#2acce0','#38be7a','#f0a830','#9880e8','#e05a5a','#f07840'];

// ═══════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════
function showWelcome(){
  document.querySelectorAll('.tab-pane').forEach(p=>p.innerHTML='');
  $('tab-overview').innerHTML=`
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 20px">
  <div style="font-size:56px;margin-bottom:20px">💰</div>
  <div style="font-size:24px;font-weight:700;color:var(--text2);margin-bottom:10px">歡迎使用資產管理 App</div>
  <div style="font-size:14px;color:var(--muted);margin-bottom:32px;max-width:360px;line-height:1.7">
    請先從電腦版點「📤 匯出」下載備份 JSON，<br>再點下方按鈕匯入，即可在手機 / 任何裝置使用。
  </div>
  <label style="display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;padding:14px 28px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;margin-bottom:16px">
    📥 匯入備份資料
    <input type="file" accept=".json" style="display:none" onchange="importData(this)">
  </label>
  <div style="font-size:12px;color:var(--muted2)">或點右上角「＋ 新增 / 更新月份」從頭開始建立</div>
</div>`;
  $('tab-overview').classList.add('active');
}

function renderOverview(){
  if(D.overview.length===0){showWelcome();return;}
  const ov=D.overview,cur=ov[ov.length-1],prev=ov[ov.length-2]||cur;
  const nd=cur.netAssets-prev.netAssets,ndp=prev.netAssets?nd/prev.netAssets:0;
  const etfP=cur.totalAssets?cur.etfValue/cur.totalAssets:0;
  $('tab-overview').innerHTML=`
<div class="kpi-grid">
  <div class="kpi"><div class="kpi-lbl">資產淨額（最新）</div><div class="kpi-val" style="color:var(--blue2)">${money(cur.netAssets)}</div><div class="kpi-sub">${nd>=0?`<span class="pos">▲ ${money(nd)}</span>`:`<span class="neg">▼ ${money(Math.abs(nd))}</span>`}&nbsp;${ndp>=0?`<span class="pos">${pct(ndp)}</span>`:`<span class="neg">${pct(ndp)}</span>`} vs上月</div><div class="kpi-bar"><div class="kpi-fill" style="width:${clamp(cur.netAssets/1200000*100,5,100)}%;background:var(--blue)"></div></div></div>
  <div class="kpi"><div class="kpi-lbl">總資產</div><div class="kpi-val">${money(cur.totalAssets)}</div><div class="kpi-sub"><span class="neu">${fmtM(cur.month)} 更新</span></div><div class="kpi-bar"><div class="kpi-fill" style="width:${clamp(cur.totalAssets/1200000*100,5,100)}%;background:var(--teal)"></div></div></div>
  <div class="kpi"><div class="kpi-lbl">ETF 市值</div><div class="kpi-val" style="color:var(--purple)">${money(cur.etfValue)}</div><div class="kpi-sub"><span class="neu">佔總資產 ${pct(etfP)}</span></div><div class="kpi-bar"><div class="kpi-fill" style="width:${clamp(etfP*100,5,100)}%;background:var(--purple)"></div></div></div>
  <div class="kpi"><div class="kpi-lbl">帳戶餘額合計</div><div class="kpi-val" style="color:var(--green)">${money(cur.bankBalance)}</div><div class="kpi-sub"><span class="neg">${money(cur.creditCard)}</span><span class="neu">&nbsp;待結清</span></div><div class="kpi-bar"><div class="kpi-fill" style="width:${clamp(cur.bankBalance/400000*100,5,100)}%;background:var(--green)"></div></div></div>
</div>
<div class="chart-row col-21">
  <div class="chart-card"><div class="chart-title">資產淨額趨勢</div><div class="chart-wrap"><canvas id="c_net"></canvas></div></div>
  <div class="chart-card"><div class="chart-title">資產配置（最新）</div><div class="chart-wrap" style="height:240px"><canvas id="c_alloc"></canvas></div></div>
</div>
<div class="chart-row col-1">
  <div class="chart-card"><div class="chart-title">月收入 vs 月支出</div><div class="chart-wrap"><canvas id="c_io"></canvas></div></div>
</div>
<div class="tbl-card">
  <div class="tbl-hdr"><div class="tbl-title">月度總覽</div></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>月份</th><th>資產淨額</th><th>月增減</th><th>總資產</th><th>ETF市值</th><th>帳戶餘額</th><th>待結清卡費</th><th>總支出</th></tr></thead>
    <tbody>${[...ov].reverse().map((r,i,a)=>{const p=a[i+1];const d=p?r.netAssets-p.netAssets:null;return`<tr><td>${fmtM(r.month)}</td><td>${money(r.netAssets)}</td><td>${d!=null?(d>=0?`<span class="pos">▲${money(d)}</span>`:`<span class="neg">▼${money(Math.abs(d))}</span>`):'—'}</td><td>${money(r.totalAssets)}</td><td>${money(r.etfValue)}</td><td>${money(r.bankBalance)}</td><td class="neg">${money(r.creditCard)}</td><td class="neg">${money(r.totalExpenses)}</td></tr>`}).join('')}</tbody>
  </table></div>
</div>`;
  const lbl=ov.map(r=>fmtM(r.month));
  mkChart('c_net',{type:'line',data:{labels:lbl,datasets:[
    {label:'資產淨額',data:ov.map(r=>r.netAssets),borderColor:'#5690f5',backgroundColor:'rgba(86,144,245,.07)',fill:true,tension:.35,pointRadius:4,pointHoverRadius:6,borderWidth:2},
    {label:'總資產',data:ov.map(r=>r.totalAssets),borderColor:'#2acce0',backgroundColor:'rgba(42,204,224,.04)',fill:true,tension:.35,pointRadius:3,borderDash:[4,3],borderWidth:1.5},
  ]},options:{responsive:true,plugins:{tooltip:{callbacks:{label:c=>' '+money(c.raw)}}},scales:{y:{ticks:{callback:v=>'$'+nt(v)},grid:{color:'rgba(255,255,255,.05)'}},x:{grid:{color:'rgba(255,255,255,.03)'}}}}});
  mkChart('c_alloc',{type:'doughnut',data:{labels:['ETF市值','銀行帳戶'],datasets:[{data:[cur.etfValue,cur.bankBalance],backgroundColor:['rgba(152,128,232,.8)','rgba(56,190,122,.75)'],borderColor:['#9880e8','#38be7a'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'66%',plugins:{tooltip:{callbacks:{label:c=>` ${c.label}: ${money(c.raw)} (${pct(c.raw/cur.totalAssets)})`}}}}});
  mkChart('c_io',{type:'bar',data:{labels:lbl,datasets:[
    {label:'工作收入',data:ov.map(r=>r.income),backgroundColor:'rgba(56,190,122,.7)',borderRadius:4},

function renderPGCards(){
  return D.personalGoals.map(g=>`

function estimateYears(dateStr){
  const m=dateStr?dateStr.match(/(\d{4})/):null;
  if(!m)return'—';
  const diff=parseInt(m[1])-new Date().getFullYear();
  return diff<=0?'已到期':diff+'年';
}

function calcGoal(){
  const target=parseFloat($('calcTarget')?.value)||0;
  const monthlySav=parseFloat($('calcSav')?.value)||0;
  const curNet=D.overview[D.overview.length-1].netAssets;
  const r=$('calcResult');if(!r)return;
  if(!target||!monthlySav){r.innerHTML='';return}
  const gap=Math.max(0,target-curNet);
  const mos=gap>0?Math.ceil(gap/monthlySav):0;
  const now=new Date();
  const arr=new Date(now.getFullYear(),now.getMonth()+mos,1);
  const arrStr=arr.toLocaleDateString('zh-TW',{year:'numeric',month:'long'});
  let html=gap<=0
    ?`<div class="calc-result"><div class="calc-result-main" style="color:var(--green)">✓ 已達成！</div><div class="calc-result-sub">目前資產 ${money(curNet)} 已超過目標 ${money(target)}</div></div>`
    :`<div class="calc-result"><div class="calc-result-main">約 ${mos} 個月後 → ${arrStr}</div><div class="calc-result-sub">距目標還差 ${money(gap)}，以每月 ${money(monthlySav)} 計算</div></div>`;
  html+=`<div style="display:flex;gap:8px;flex-wrap:wrap">${[8000,12000,15000,20000].map(s=>{
    const m2=gap>0?Math.ceil(gap/s):0;
    return`<div style="background:var(--card3);border-radius:8px;padding:8px 12px;font-size:12px;min-width:90px"><div style="color:var(--muted);margin-bottom:2px">月存${money(s)}</div><div style="color:var(--text2);font-weight:600">${m2===0?'✓ 已達成':`${m2} 個月`}</div></div>`;
  }).join('')}</div>`;
  r.innerHTML=html;
}

function delGoal(id){if(!confirm('確定刪除此目標？'))return;D.goals=D.goals.filter(g=>g.id!==id);save();renderGoals()}
function delPG(id){if(!confirm('確定刪除此個人目標？'))return;D.personalGoals=D.personalGoals.filter(g=>g.id!==id);save();renderGoals()}

function nv(id){const e=$(id);if(!e||e.value.trim()==='')return null;const v=parseFloat(e.value);return isNaN(v)?null:v}
function sv(id){const e=$(id);return e?e.value.trim():null}

function mergeArr(arr,month,updates){
  const idx=arr.findIndex(r=>r.month===month);
  if(idx<0){arr.push({month,...updates});arr.sort((a,b)=>a.month.localeCompare(b.month));}
  else{Object.entries(updates).forEach(([k,v])=>{if(v!==null&&v!==undefined)arr[idx][k]=v})}
}

function saveMonth(){
  const month=sv('f_m');if(!month){alert('請選擇月份');return}
  const work=nv('f_w'),other=nv('f_o'),otherNote=sv('f_on'),sav=nv('f_s');
  const b1=nv('f_b1'),b2=nv('f_b2'),b3=nv('f_b3');
  const cc=nv('f_cc'),cash=nv('f_ca'),fil=nv('f_fi'),rent=nv('f_re'),bty=nv('f_bt'),ins=nv('f_in'),note=sv('f_no');
  const etfMkt=nv('f_etf'),etfInv=nv('f_ei');

  const existInc=D.income.find(r=>r.month===month)||{};
  const newWork=work??existInc.workIncome??0;
  const newSav=sav??existInc.savings??0;
  // 用「上個月的累計儲蓄」當基準，而不是從頭加總（避免忽略歷史資料）
  const prevMonthInc=[...D.income].filter(r=>r.month<month).sort((a,b)=>b.month.localeCompare(a.month))[0];
  const prevCum=prevMonthInc?(prevMonthInc.cumSavings??0):0;
  const savRate=newWork>0?newSav/newWork:0;
  mergeArr(D.income,month,{workIncome:work,otherIncome:other,otherNote:otherNote||undefined,savings:sav,savingsRate:savRate||undefined,cumSavings:prevCum+newSav||undefined,changBank:b1,esuBank:b2,yongBank:b3});

  const existExp=D.expenses.find(r=>r.month===month)||{};
  const newCC=cc??existExp.creditCard??0,newCash=cash??existExp.cash??0;
  const newFil=fil??existExp.filialPiety??0,newRent=rent??existExp.rent??0;
  const newBty=bty??existExp.beauty??0,newIns=ins??existExp.insurance??0;
  const totalExp=newCC+newCash+newFil+newRent+newBty+newIns;
  mergeArr(D.expenses,month,{total:totalExp||undefined,creditCard:cc,cash,filialPiety:fil,rent,beauty:bty,insurance:ins,note:note||undefined});

  if(etfMkt!==null||etfInv!==null){
    const lastEtf=D.etf[D.etf.length-1]||{invested:0};
    const existEtf=D.etf.find(r=>r.month===month);
    const baseInv=existEtf?.invested||lastEtf.invested||0;
    const inv=etfInv!==null?baseInv+etfInv:baseInv;
    const mkt=etfMkt??existEtf?.market;
    if(mkt!==undefined){
      const pnl=mkt-inv;
      mergeArr(D.etf,month,{invested:inv||undefined,market:etfMkt,pnl:pnl||undefined,pnlRate:inv>0?pnl/inv:undefined});
    }
  }

  const existOv=D.overview.find(r=>r.month===month)||{};
  const incR=D.income.find(r=>r.month===month)||{};
  const expR=D.expenses.find(r=>r.month===month)||{};
  const etfR=D.etf.find(r=>r.month===month)||{};
  const bk=(incR.changBank||0)+(incR.esuBank||0)+(incR.yongBank||0);
  const netA=(etfR.market||existOv.etfValue||0)+(bk||existOv.bankBalance||0)-(expR.creditCard||existOv.creditCard||0);
  mergeArr(D.overview,month,{netAssets:netA||undefined,income:work,etfValue:etfMkt,bankBalance:bk||undefined,totalAssets:(etfR.market||existOv.etfValue||0)+(bk||existOv.bankBalance||0)||undefined,creditCard:cc,totalExpenses:totalExp||undefined});
  save();closeModal();REND[_activeTab]();
  const msg=D.overview.find(r=>r.month===month)?.netAssets;
  alert(`✅ ${fmtM(month)} 資料已更新！${msg?' 資產淨額：'+money(msg):''}`);
}

<div class="form-grid">

</div>
<div class="form-grid form-grid-2" style="margin-top:10px">
  <div class="fg"><label>預計完成時間</label><input type="text" id="pgDate" value="${g?.targetDate||''}" placeholder="ex. 2028年春天"></div>
  <div class="fg"><label>實際完成日期</label><input type="date" id="pgActual" value="${g?.actualDate||''}"></div>
</div>
<div class="form-grid" style="margin-top:10px">
  <div class="fg"><label>備註</label><input type="text" id="pgNote" value="${g?.note||''}" placeholder="任何說明"></div>
</div>`,()=>{
    try {
      // 1. 安全地獲取所有輸入框的元素與值
      const goalEl = document.getElementById('pgGoal');
      const goal = goalEl ? goalEl.value.trim() : '';
      if(!goal){ alert('請填寫目標名稱'); return; }

      const targetDateEl = document.getElementById('pgDate');
      const targetDate = targetDateEl ? targetDateEl.value.trim() : '';

      const actualDateEl = document.getElementById('pgActual');
      const actualDate = actualDateEl ? actualDateEl.value : '';

      const noteEl = document.getElementById('pgNote');
      const note = noteEl ? noteEl.value.trim() : '';

      // 2. 安全地指派顏色
      const fallbackColor = (typeof COLORS !== 'undefined' && COLORS.length > 0) 
        ? COLORS[Math.max(0, D.personalGoals.length) % COLORS.length] 
        : '#5690f5';
      const color = (g && g.color) ? g.color : fallbackColor;

      // 3. 更新或新增資料
      if(g){
        g.goal = goal;
        g.targetDate = targetDate;
        g.actualDate = actualDate;
        g.note = note;
      } else {
        // uid() 在上面已經宣告過，這裡直接使用
        D.personalGoals.push({id: uid(), goal, targetDate, actualDate, note, color});
      }

      // 4. 儲存、關閉視窗並重新渲染畫面
      save();
      closeModal();
      renderGoals();

    } catch (err) {
      // 若有任何隱藏的錯誤，直接跳窗顯示，不再默默死當
      alert('儲存時發生錯誤：\n' + err.message);
      console.error('儲存個人目標失敗:', err);
    }
  });
}

// ── Dividend ──
function openDivModal(){
  const holdOpts=D.holdings.map(h=>`<option value="${h.code}">${h.code} ${h.name}（${nt(h.shares)}股）</option>`).join('');
  openModal('新增股利紀錄','',`
<div class="form-grid form-grid-2">
  <div class="fg"><label>日期 *</label><input type="date" id="dDate"></div>
  <div class="fg"><label>股票 *</label><select id="dCode">${holdOpts}</select></div>
</div>
<div class="form-grid form-grid-2" style="margin-top:10px">
  <div class="fg"><label>每股股利（元）*</label><input type="number" id="dDps" step="0.01" placeholder="0.00" oninput="calcDiv()"></div>
  <div class="fg"><label>持有股數</label><input type="number" id="dShares" placeholder="自動帶入" oninput="calcDiv()"></div>
</div>
<div id="dCalcResult" style="margin-top:8px;padding:10px;background:var(--card3);border-radius:8px;font-size:13px;color:var(--green)"></div>
<div class="form-grid" style="margin-top:10px">
  <div class="fg"><label>備註</label><input type="text" id="dNote" placeholder="ex. 2025年中期股利"></div>
</div>`,()=>{
    const date=$('dDate')?.value,code=$('dCode')?.value;
    const dps=parseFloat($('dDps')?.value);
    if(!date||!code||!dps){alert('請填寫必填欄位');return}
    const h=D.holdings.find(x=>x.code===code);
    const shares=parseFloat($('dShares')?.value)||h?.shares||0;
    const total=Math.round(dps*shares);
    D.dividends.push({id:uid(),date,code,name:h?.name||code,divPerShare:dps,shares,totalDividend:total,note:$('dNote')?.value.trim()||''});
    D.dividends.sort((a,b)=>b.date.localeCompare(a.date));
    save();closeModal();renderDividend();
  });
  setTimeout(()=>{const el=$('dCode');if(!el)return;const fill=()=>{const h=D.holdings.find(x=>x.code===el.value);if(h)$('dShares').value=h.shares;calcDiv()};el.onchange=fill;fill();},50);
}
function calcDiv(){
  const dps=parseFloat($('dDps')?.value)||0,sh=parseFloat($('dShares')?.value)||0;
  const r=$('dCalcResult');if(r)r.textContent=dps&&sh?`合計股利：${money(Math.round(dps*sh))}`:'';
}

function openHoldingModal(code){
  const h=code?D.holdings.find(x=>x.code===code):null;
  openModal(h?`編輯持倉（${code}）`:'新增持股','',`
<div class="form-grid form-grid-2">
  <div class="fg"><label>股票代號 *</label><input type="text" id="hCode" value="${h?.code||''}" placeholder="ex. 0050" ${h?'readonly style="opacity:.65"':''}></div>
  <div class="fg"><label>股票名稱 *</label><input type="text" id="hName" value="${h?.name||''}" placeholder="ex. 元大台灣50"></div>
</div>
<div class="form-grid form-grid-2" style="margin-top:10px">
  <div class="fg"><label>持有股數</label><input type="number" id="hShares" value="${h?.shares||''}" placeholder="0"></div>
  <div class="fg"><label>平均成本（元）</label><input type="number" id="hAvg" step="0.01" value="${h?.avgCost||''}" placeholder="0.00"></div>
</div>
<div class="form-grid form-grid-2" style="margin-top:10px">
  <div class="fg"><label>參考市值（元）</label><input type="number" id="hMkt" value="${h?.market||''}" placeholder="0"></div>
  <div class="fg"><label>總投資成本（元）</label><input type="number" id="hCost" value="${h?.totalCost||''}" placeholder="自動計算"><div class="hint">空白則自動 = 股數 × 均成本</div></div>
</div>`,()=>{
    const code2=(($('hCode')?.value)||'').trim().toUpperCase();
    const name=($('hName')?.value||'').trim();
    if(!code2||!name){alert('請填寫股票代號與名稱');return}
    const shares=parseFloat($('hShares')?.value)||0;
    const avgCost=parseFloat($('hAvg')?.value)||0;
    const market=parseFloat($('hMkt')?.value)||0;
    const totalCost=parseFloat($('hCost')?.value)||Math.round(shares*avgCost);
    const pnl=market-totalCost,rate=totalCost>0?pnl/totalCost:0;
    if(h){h.name=name;h.shares=shares;h.avgCost=avgCost;h.totalCost=totalCost;h.market=market;h.pnl=pnl;h.rate=rate;}
    else{
      if(D.holdings.find(x=>x.code===code2)){alert('此代號已存在，請直接編輯');return}
      D.holdings.push({code:code2,name,shares,avgCost,totalCost,market,pnl,rate});
    }
    save();closeModal();renderInvest();
  });
}

function delHolding(code){
  if(!confirm(`確定刪除 ${code} 的持倉紀錄？`))return;
  D.holdings=D.holdings.filter(h=>h.code!==code);
  save();renderInvest();
}

function parseStatementText() {
  const txt = $('stmtText').value.replace(/,/g, ''); // 移除千分位逗號
  if (!txt) { alert('請先貼上文字'); return; }
  let foundCount = 0;
  D.holdings.forEach((h, i) => {
    // 尋找股票代號，並抓取代號後面的連續數字
    const regex = new RegExp(h.code + '[^0-9]*([0-9]+\\.?[0-9]*)[^0-9]*([0-9]+\\.?[0-9]*)[^0-9]*([0-9]+\\.?[0-9]*)', 'i');
    const match = txt.match(regex);
    if (match) {
      const nums = [parseFloat(match[1]), parseFloat(match[2]), parseFloat(match[3])].filter(n => !isNaN(n));
      if (nums.length > 0) {
        const maxNum = Math.max(...nums); // 假設券商明細中，最大的數字通常是「總市值」
        if (maxNum > h.market * 0.3) {
          $('su_mk_'+i).value = maxNum;
          foundCount++;
        }
      }
    }
  });
  if(foundCount > 0) alert('已嘗試解析 ' + foundCount + ' 筆市值，請確認下方表格是否正確再按儲存！');
  else alert('無法識別對應數字。各家券商格式差異較大，若抓取失敗請手動填寫下方表格。');
}

function saveStatementData(){
  D.holdings.forEach((h,i)=>{
    const shEl=document.getElementById('su_sh_'+i);
    const acEl=document.getElementById('su_ac_'+i);
    const mkEl=document.getElementById('su_mk_'+i);
    if(shEl&&shEl.value!=='')h.shares=parseFloat(shEl.value)||h.shares;
    if(acEl&&acEl.value!=='')h.avgCost=parseFloat(acEl.value)||h.avgCost;
    if(mkEl&&mkEl.value!==''){
      h.market=parseFloat(mkEl.value);
      h.totalCost=Math.round(h.shares*h.avgCost);
      h.pnl=h.market-h.totalCost;
      h.rate=h.totalCost>0?h.pnl/h.totalCost:0;
    }
  });
  save();closeModal();renderInvest();
  alert('✅ 持倉資料已更新！');
}

// 匯出 / 匯入
// ═══════════════════════════════════════════
function exportData(){
  const now=new Date();
  const ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const json=JSON.stringify(D,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`資產管理_備份_${ts}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed||!Array.isArray(parsed.overview)){
        alert('❌ 檔案格式錯誤：不是有效的資產管理備份檔。');
        input.value='';return;
      }
      const keys=['overview','income','expenses','etf','holdings','transactions','goals','personalGoals','dividends','dividendSchedule'];
      const missing=keys.filter(k=>parsed[k]===undefined);
      if(missing.length>0){
        const ok=confirm(`⚠️ 此備份缺少部分欄位：${missing.join(', ')}\n\n仍要繼續匯入嗎？（缺少的部分將保留目前資料）`);
        if(!ok){input.value='';return;}
        missing.forEach(k=>{ parsed[k]=D[k]; });
      }
      const ok=confirm(`確定要匯入此備份？\n\n📅 資料期間：${parsed.overview[0]?.month||'?'} ～ ${parsed.overview[parsed.overview.length-1]?.month||'?'}\n📊 月份筆數：${parsed.overview.length} 筆\n💼 持倉：${parsed.holdings?.length||0} 檔\n🎯 目標：${parsed.goals?.length||0} 個\n\n⚠️ 目前的資料將被取代！`);
      if(!ok){input.value='';return;}
      if(parsed.personalGoals)parsed.personalGoals.forEach(g=>{if(g.actualDate===undefined)g.actualDate='';});
      D=parsed;
      save();
      _activeTab='overview';
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      document.querySelector('[data-tab="overview"]').classList.add('active');
      $('tab-overview').classList.add('active');
      renderOverview();
      alert('✅ 匯入成功！資料已載入。');
    }catch(err){
      alert('❌ 讀取失敗：檔案可能已損毀或格式不正確。\n\n錯誤：'+err.message);
    }finally{
      input.value='';
    }
  };
  reader.readAsText(file,'utf-8');
}

const REND={overview:renderOverview,income:renderIncome,expenses:renderExpenses,invest:renderInvest,dividend:renderDividend,goals:renderGoals,annual:renderAnnual};

document.querySelectorAll('.tab').forEach(el=>{

    if(D.overview.length===0){showWelcome();return;}
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

});
